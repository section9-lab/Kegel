name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ] # 当推送形如 v1.0.0 的 tag 时触发
  pull_request:
    branches: [ main ]

permissions:
  contents: write # 必须开启写入权限以创建 Release

jobs:
  build:
    name: Build and Package
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache SwiftPM Dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build App
        run: |
          swift build -c release --arch arm64

      - name: Create App Bundle
        run: |
          APP_NAME="KegelTimer"
          DIST_DIR="dist"
          APP_BUNDLE="$DIST_DIR/$APP_NAME.app"
          
          # 创建标准的 .app 目录结构
          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          
          # 拷贝二进制文件 (仅 arm64)
          cp .build/arm64-apple-macosx/release/Kegel "$APP_BUNDLE/Contents/MacOS/$APP_NAME"
          
          # 拷贝 Info.plist
          cp App/Info.plist "$APP_BUNDLE/Contents/Info.plist"
          
          # 拷贝图标 (确保与 Info.plist 的 CFBundleIconFile 匹配)
          if [ -f "App/KegelTimer.icns" ]; then
            cp App/KegelTimer.icns "$APP_BUNDLE/Contents/Resources/KegelTimer.icns"
          fi
          
          # 修正权限
          chmod +x "$APP_BUNDLE/Contents/MacOS/$APP_NAME"
          
          # 打包
          cd "$DIST_DIR"
          zip -r "../$APP_NAME-AppleSilicon.zip" "$APP_NAME.app"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KegelTimer-macOS-arm64
          path: KegelTimer-AppleSilicon.zip

  release:
    name: Release to GitHub
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') # 仅在推送 tag 时运行
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: KegelTimer-macOS-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: KegelTimer-AppleSilicon.zip
          generate_release_notes: true
          draft: false
          prerelease: false
